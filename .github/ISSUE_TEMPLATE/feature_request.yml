name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: A short summary of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you have considered
    validations:
      required: false
